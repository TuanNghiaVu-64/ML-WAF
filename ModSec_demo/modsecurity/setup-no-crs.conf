#
# Minimal ModSecurity setup that excludes the OWASP Core Rule Set.
# Used by the dvwa_modsec container so it runs ModSecurity without CRS.
#

Include /etc/modsecurity.d/modsecurity.conf
Include /etc/modsecurity.d/modsecurity-override.conf

# Place any custom rules in these optional folders if needed.
IncludeOptional /etc/modsecurity.d/custom-before/*.conf
IncludeOptional /etc/modsecurity.d/custom-after/*.conf

